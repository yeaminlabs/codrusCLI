name: Bug Report
description: Report an issue that should be fixed
labels:
  - bug
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a bug report! It helps make CodrusCLI powered by Codrus models better for everyone.

        If you need help or support using CodrusCLI powered by Codrus models, and are not reporting a bug, please post on [codrus-cli/discussions](https://github.com/MoonshotAI/codrus-cli/discussions), where you can ask questions or engage with others on ideas for how to improve CodrusCLI powered by Codrus models.

        Make sure you are running the latest version of CodrusCLI powered by Codrus models (`uv tool upgrade codrus-cli` to upgrade). The bug you are experiencing may already have been fixed.

        Please try to include as much information as possible.

  - type: input
    id: version
    attributes:
      label: What version of CodrusCLI powered by Codrus models is running?
      description: Copy the output of `codrus --version` or `/version`
    validations:
      required: true
  - type: input
    id: plan
    attributes:
      label: Which open platform/subscription were you using?
      description: The one you selected when running `/login` or `/setup`
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Which model were you using?
      description: The one you can see on the bottom status line, like `codrus-k2-turbo-preview`, `codrus-for-coding`, etc.
  - type: input
    id: platform
    attributes:
      label: What platform is your computer?
      description: |
        For MacOS and Linux: copy the output of `uname -mprs`
        For Windows: copy the output of `"$([Environment]::OSVersion | ForEach-Object VersionString) $(if ([Environment]::Is64BitOperatingSystem) { "x64" } else { "x86" })"` in the PowerShell console
  - type: textarea
    id: actual
    attributes:
      label: What issue are you seeing?
      description: Please include the full error messages and prompts with any private information redacted. If possible, please provide text instead of a screenshot.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: What steps can reproduce the bug?
      description: Explain the bug and provide a code snippet that can reproduce it. Please include session id and context usage if applicable.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What is the expected behavior?
      description: If possible, please provide text instead of a screenshot.
  - type: textarea
    id: notes
    attributes:
      label: Additional information
      description: Is there anything else you think we should know?
