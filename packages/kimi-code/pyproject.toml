[project]
name = "codrus-code"
version = "1.49.0"
description = "Codrus Code is a CLI agent that lives in your terminal."
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["codrus-cli==1.49.0"]

[project.scripts]
codrus-code = "codrus_cli.__main__:main"

[build-system]
requires = ["uv_build>=0.8.5,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["kimi_code"]
